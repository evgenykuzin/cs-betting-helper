name: Deploy to production

on:
  push:
    branches: [main]

env:
  SERVER_HOST: 76.13.249.114
  SERVER_USER: root
  DEPLOY_PATH: /opt/cs-betting-helper

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}

            # Create .env from secrets if not exists
            if [ ! -f .env ]; then
              echo "ODDSPAPI_API_KEY=${{ secrets.ODDSPAPI_API_KEY }}" > .env
              echo "DATABASE_URL=postgresql+asyncpg://cs_user:cs_password@postgres:5432/cs_betting" >> .env
              echo "REDIS_URL=redis://redis:6379/0" >> .env
              echo "CELERY_BROKER_URL=redis://redis:6379/1" >> .env
              echo "CELERY_RESULT_BACKEND=redis://redis:6379/2" >> .env
              echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
              echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
              echo "POLL_INTERVAL_SECONDS=300" >> .env
            fi

            # Build & deploy
            docker compose pull
            docker compose build --no-cache
            docker compose up -d

            # Health check
            sleep 10
            docker compose ps
            echo "✅ Deploy complete"
